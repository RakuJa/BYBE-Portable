<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root {
    color-scheme: dark;
  }
  html, body {
    margin: 0;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1b1b1f;
    color: #f0f0f0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    text-align: center;
    -webkit-user-select: none;
    user-select: none;
  }
  .wrapper {
    padding: 24px;
    animation: fade-in 400ms ease-out;
  }
  .logo {
    width: 64px;
    height: 64px;
    margin: 0 auto 20px;
    display: block;
    border-radius: 16px;
  }
  .spinner {
    margin: 0 auto 18px;
    width: 34px;
    height: 34px;
    border: 3px solid #3a3a40;
    border-top-color: #1976d2;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  p {
    margin: 0;
    font-size: 28px;
    line-height: 1.5;
    color: #c9c9d1;
  }
  p strong {
    color: #f0f0f0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fade-in {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (prefers-reduced-motion: reduce) {
    .spinner { animation: none; border-top-color: #3a3a40; }
    .wrapper { animation: none; }
  }
  .hint {
    margin-top: 10px;
    font-size: 24px;
    color: #8f8f99;
    opacity: 0;
    transition: opacity 400ms ease-in;
  }
  .hint.visible { opacity: 1; }
  .flavor {
    margin-top: 10px;
    min-height: 1.4em;
    font-size: 25px;
    font-style: italic;
    color: #7a7a86;
    opacity: 1;
    transition: opacity 250ms ease;
  }
  .flavor.fading { opacity: 0; }
</style>
</head>

    <div class="spinner"></div>
    <p><strong>Setting up BYBE</strong><br>Preparing your data for the first time&hellip;</p>
    <p id="flavor" class="flavor"></p>
    <p id="slow-hint" class="hint">This is normal and can take up to two minutes &mdash; please keep the app open.</p>
  </div>
  <script>
    setTimeout(function () {
      document.getElementById('slow-hint').classList.add('visible');
    }, 15000);

    var flavors = [
      "Rolling initiative for the database…",
      "Waiting for the wizard to cast Fireball…",
      "Bribing goblins to stop hoarding shinies…",
      "Consulting the Archives of Nethys…",
      "Taking a long rest until the tables are ready…",
      "Asking the Pathfinder Society for directions…",
      "Casting Identify Magic on the SQL dump…",
      "Convincing a kobold to finish the migration…",
      "Rolling a natural 1 on Perception to find the last bug…",
      "Negotiating with a hungry owlbear…",
      "Recalling knowledge about ancient dragons…",
      "Searching the data dump for traps…",
      "Waiting on the alchemist to finish bottling potions…",
      "Haggling with a shopkeeper over bulk pricing…",
      "Gathering information on Lucky Lanks…"
    ];

    var reduceMotion = window.matchMedia
      && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    var flavorEl = document.getElementById('flavor');
    var queue = [];

    function refillQueue() {
      queue = flavors.slice();
      for (var i = queue.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = queue[i];
        queue[i] = queue[j];
        queue[j] = tmp;
      }
    }

    function showNextFlavor() {
      if (queue.length === 0) {
        refillQueue();
      }
      flavorEl.textContent = queue.pop();
    }

    function cycleFlavor() {
      if (reduceMotion) {
        showNextFlavor();
        return;
      }
      flavorEl.classList.add('fading');
      setTimeout(function () {
        showNextFlavor();
        flavorEl.classList.remove('fading');
      }, 250);
    }

    showNextFlavor();
    setInterval(cycleFlavor, 5000);
  </script>
