app-id: io.github.rakuja.bybe
runtime: org.gnome.Platform
runtime-version: "49"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable
  - org.freedesktop.Sdk.Extension.node22
command: bybe-portable
finish-args:
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --socket=session-bus
modules:
  - name: bybe-portable
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/rust-stable/bin:/usr/lib/sdk/node22/bin
      build-args:
        - --share=network # Enable network during build (otherwise frontend does not compile)
      env:
        CARGO_HOME: /run/build/bybe-portable/cargo
        npm_config_offline: "true"
    build-commands:
      - cargo --offline install tauri-cli
      # Build with Tauri
      - cargo --offline tauri build --config '{"bundle":{"active":false}}'
      # Install the binary
      - install -Dm755 target/release/BYBE-Portable /app/bin/bybe-portable
      # Install resource files
      - install -Dm644 BYBE-backend/.env /app/share/bybe-portable/.env
      - install -Dm644 BYBE-backend/data/database.db_copy /app/share/bybe-portable/data/database.db
      - install -Dm644 BYBE-backend/data/names.json /app/share/bybe-portable/data/names.json
      - install -Dm644 BYBE-backend/data/nicknames.json /app/share/bybe-portable/data/nicknames.json
      # Install desktop file
      - install -Dm644 io.github.rakuja.bybe.desktop /app/share/applications/io.github.rakuja.bybe.desktop
      # Install icons
      - install -Dm644 icons/32x32.png /app/share/icons/hicolor/32x32/apps/io.github.rakuja.bybe.png
      - install -Dm644 icons/128x128.png /app/share/icons/hicolor/128x128/apps/io.github.rakuja.bybe.png
      # Install AppStream metadata
      - install -Dm644 io.github.rakuja.bybe.metainfo.xml /app/share/metainfo/io.github.rakuja.bybe.metainfo.xml
    sources:
      - type: dir
        path: BYBE-tauri
      - rust-generated-sources.json
